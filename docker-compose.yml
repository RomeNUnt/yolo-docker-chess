version: "3.9"

services:

  web:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./web/html/index.html:/usr/share/nginx/html/index.html
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - yolo-service

  yolo-service:
    build: ./ai
    container_name: yolo-service