server {
    listen 80;

    client_max_body_size 20M;  # Allow large file uploads (adjust as needed)

    # 1. Serve the Frontend HTML
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    # 2. Proxy the Backend API (Bypassing CORS)
    location /api/ {
        # 'yolo-service' must match your docker-compose service name.
        # The trailing slash is critical! It strips '/api/' from the request before forwarding.
        proxy_pass http://yolo-service:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}