<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Piece Detector</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 30px;
    max-width: 900px;
    width: 90%;
    margin: 40px auto;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.version {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 12px;
    color: #888;
}

button {
    padding: 10px 20px;
    font-size: 16px;
}

/* Image + canvas overlay */
.image-wrapper{
    position: relative;
    display: inline-block;
}

#preview{
    max-width: 100%;
    height: auto;
    display: block;
}

#canvas{
    position:absolute;
    left:0;
    top:0;
}
</style>

</head>

<body>

<div class="container">

<div class = "version">v1.0.4</div>

<h1>♟ Chess Piece Detector</h1>
<p>Note: Detections will be displayed as abbreviations</p>
<p>Example: "WK" = white king, "BKN" = black knight, etc.</p>

<input type="file" id="fileInput"><br><br>
<button onclick="detect()">Detect Pieces</button>

<br><br>

<div class="image-wrapper">
<img id="preview">
<canvas id="canvas"></canvas>
</div>

</div>

<h3>Detections</h3>
<pre id="results"></pre>

<script>

async function detect(){

    const file = document.getElementById("fileInput").files[0]

    const formData = new FormData()
    formData.append("file", file)

    const response = await fetch("/api/predict",{
        method:"POST",
        body:formData
    })

    const data = await response.json()
    document.getElementById("results").textContent = JSON.stringify(data.detections, null, 2)

    const img = document.getElementById("preview")
    img.src = URL.createObjectURL(file)

    img.onload = () => drawBoxes(data.detections)
}


function drawBoxes(detections){

    const img = document.getElementById("preview")
    const canvas = document.getElementById("canvas")

    canvas.width = img.width
    canvas.height = img.height

    const ctx = canvas.getContext("2d")

    const scaleX = img.width / img.naturalWidth
    const scaleY = img.height / img.naturalHeight

    ctx.clearRect(0,0,canvas.width,canvas.height)

    ctx.strokeStyle = "red"
    ctx.lineWidth = 3
    ctx.font = "16px Arial"
    ctx.fillStyle = "red"

    detections.forEach(det => {

        const x = det.bbox.x1 * scaleX
        const y = det.bbox.y1 * scaleY
        const w = (det.bbox.x2 - det.bbox.x1) * scaleX
        const h = (det.bbox.y2 - det.bbox.y1) * scaleY

        ctx.strokeRect(x,y,w,h)

        ctx.fillText(
            det.class + " " + det.confidence.toFixed(2),
            x,
            y - 5
        )
    })
}

</script>

</body>
</html>
